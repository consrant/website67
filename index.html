<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConsrantSite</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
            color: white;
            text-align: center;
        }

        header {
            padding: 20px;
            font-size: 2em;
            font-weight: bold;
        }

        img {
            max-width: 300px;
            border-radius: 20px;
            margin-top: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            margin: 30px auto;
            width: 80%;
            max-width: 500px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        button {
            background: #ff4c4c;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover {
            background: #ff2a2a;
        }
    </style>
</head>

<body>

<header>Dis ma website</header>

<div class="card">
    <h2>Mr. Bigglesworth</h2>
    <img src="biggles.jpg" alt="bigglesworth the cat">
    <p>W dog.</p>

   
</div>

</body>
</html>
